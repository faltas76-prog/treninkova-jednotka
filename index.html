<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tréninkový systém ULTIMATE</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{padding:10px;display:flex;gap:8px;flex-wrap:wrap;background:#020617}
input,select,textarea{padding:8px;border-radius:8px;border:none;width:100%}
button{padding:10px;border:none;border-radius:10px;background:#22c55e;color:black;font-weight:bold}
.section{background:#111827;margin:10px;padding:12px;border-radius:12px}
.exercise{background:#1f2937;padding:10px;margin-bottom:10px;border-radius:10px}
#addBtn{position:fixed;bottom:20px;right:20px;width:60px;height:60px;border-radius:50%;font-size:24px}
</style>
</head>
<body>

<header>
<input id="title" placeholder="Název TJ">
<input type="date" id="date">
<select id="category">
<option>U6</option><option>U7–U8</option><option>U9–U10</option>
<option>U11–U12</option><option>U13–U14</option>
<option>U15</option><option>U19</option><option>Muži</option>
</select>
<button onclick="generateAI()">🤖 AI trénink</button>
<button onclick="exportPDF()">PDF</button>
</header>

<div class="section">
<h3>Cíl</h3>
<textarea id="goal"></textarea>
</div>

<div class="section">
<h3>📚 Databáze cvičení</h3>
<div id="db"></div>
</div>

<div class="section">
<h3>⚽ Cvičení</h3>
<div id="exercises"></div>
</div>

<button id="addBtn" onclick="addExercise()">+</button>

<script>

// 📚 ROZŠÍŘENÁ DATABÁZE
const DB={
 "U6":[{name:"Honěná",desc:"Zábavná hra",time:10}],
 "U9–U10":[{name:"Rondo",desc:"Přihrávky",time:15},{name:"1v1",desc:"Souboje",time:15}],
 "U15":[{name:"Pressing",desc:"Tlak na soupeře",time:20}]
};

// vykreslení DB
function renderDB(){
 const cat=category.value;
 db.innerHTML="";
 (DB[cat]||[]).forEach(ex=>{
  const b=document.createElement("button");
  b.innerText=ex.name;
  b.onclick=()=>addExercise(ex);
  db.appendChild(b);
 });
}
category.addEventListener("change",renderDB);
renderDB();

// ➕ cvičení
function addExercise(data={}){
 const div=document.createElement("div");
 div.className="exercise";
 div.innerHTML=`
 <input placeholder="Název" value="${data.name||""}">
 <textarea placeholder="Popis">${data.desc||""}</textarea>
 <textarea placeholder="Poznámky"></textarea>
 <input type="number" value="${data.time||""}">
 <button onclick="this.parentElement.remove()">❌</button>`;
 exercises.appendChild(div);
}

// 🤖 AI GENERÁTOR (simulace)
function generateAI(){
 const cat=category.value;
 exercises.innerHTML="";

 if(cat==="U6"){
  goal.value="Zábava + koordinace";
  addExercise({name:"Honička",desc:"Pohybová hra",time:10});
 }
 else if(cat==="U9–U10"){
  goal.value="Technika + hra";
  addExercise({name:"Rondo",desc:"Přihrávky",time:15});
  addExercise({name:"1v1",desc:"Souboje",time:15});
 }
 else{
  goal.value="Taktika + intenzita";
  addExercise({name:"Pressing",desc:"Tlak",time:20});
 }
}

// PDF
function exportPDF(){ html2pdf().from(document.body).save("trening.pdf"); }

</script>

</body>
</html>
