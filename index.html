<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tréninkový systém 8.0</title>

<link rel="manifest" href="manifest.json">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body{margin:0;font-family:Arial;background:#0f172a;color:white}
header{padding:10px;display:flex;gap:10px;flex-wrap:wrap;background:#020617}
input,select,textarea{padding:6px;border-radius:6px;border:none}
button{padding:6px 10px;border:none;border-radius:6px;background:#22c55e;color:black;font-weight:bold}
.layout{display:grid;grid-template-columns:250px 1fr;height:calc(100vh - 60px)}
aside,main{padding:10px;overflow:auto}
aside{background:#020617}
main{background:#020617}
.card{background:#111827;padding:10px;margin-bottom:10px;border-radius:10px}
canvas{background:#16a34a;width:100%;border-radius:10px}
</style>
</head>
<body>

<header>
<input id="title" placeholder="Název TJ">
<input type="date" id="date">
<select id="category">
<option>U6</option><option>U7–U8</option><option>U9–U10</option>
<option>U11–U12</option><option>U13–U14</option>
<option>U15</option><option>U19</option><option>Muži</option>
</select>
<button onclick="save()">💾</button>
<button onclick="load()">📂</button>
<button onclick="exportPDF()">PDF</button>
</header>

<div class="layout">

<aside>
<h3>Cíl</h3>
<textarea id="goal"></textarea>

<h3>Hráči</h3>
<input id="playerInput"><button onclick="addPlayer()">+</button>
<div id="players"></div>
</aside>

<main>
<button onclick="addExercise()">+ Cvičení</button>
<div id="exercises"></div>

<h3>Hřiště</h3>
<canvas id="pitch" width="400" height="250"></canvas>
</main>

</div>

<script>
let players=[];

function addPlayer(){
 const name=playerInput.value;
 if(!name) return;
 players.push({name,ok:true});
 playerInput.value="";
 renderPlayers();
}

function renderPlayers(){
 playersDiv.innerHTML="";
 players.forEach((p,i)=>{
  playersDiv.innerHTML+=`${p.name} <input type='checkbox' ${p.ok?'checked':''} onchange='players[${i}].ok=this.checked'><br>`;
 });
}

function addExercise(data={}){
 const div=document.createElement("div");
 div.className="card";
 div.innerHTML=`
 <input placeholder='Název' value='${data.name||""}'>
 <textarea>${data.desc||""}</textarea>
 <input type='number' value='${data.time||""}'>
 <button onclick='this.parentElement.remove()'>❌</button>`;
 exercises.appendChild(div);
}

// kreslení
const ctx=pitch.getContext("2d");
let draw=false;
pitch.onmousedown=()=>draw=true;
pitch.onmouseup=()=>draw=false;
pitch.onmousemove=e=>{
 if(!draw) return;
 ctx.fillStyle="white";
 ctx.fillRect(e.offsetX,e.offsetY,4,4);
};

function exportPDF(){
 html2pdf().from(document.body).save("trening.pdf");
}

function save(){
 const data={title:title.value,date:date.value,goal:goal.value,players,
 exercises:[...document.querySelectorAll(".card")].map(c=>{
 const i=c.querySelectorAll("input,textarea");
 return{name:i[0].value,desc:i[1].value,time:i[2].value}
 })};
 localStorage.setItem("app",JSON.stringify(data));
 alert("Uloženo");
}

function load(){
 const d=JSON.parse(localStorage.getItem("app"));
 if(!d) return;
 title.value=d.title; date.value=d.date; goal.value=d.goal;
 players=d.players||[]; renderPlayers();
 exercises.innerHTML="";
 d.exercises.forEach(addExercise);
}

// PWA
if('serviceWorker' in navigator){
 navigator.serviceWorker.register('sw.js');
}
</script>

</body>
</html>
