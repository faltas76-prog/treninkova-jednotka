<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<title>Tréninkový systém 7.0</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f1f5f9; }

header {
  background:#0f172a; color:white; padding:10px;
  display:flex; gap:10px; flex-wrap:wrap;
}

input, select, textarea { padding:6px; }

button {
  padding:6px 10px;
  border:none;
  background:#2563eb;
  color:white;
  border-radius:6px;
  cursor:pointer;
}

.layout {
  display:grid;
  grid-template-columns:260px 1fr 350px;
  height:calc(100vh - 60px);
}

aside, main {
  padding:10px;
  overflow:auto;
}

aside { background:#e2e8f0; }
main { background:white; }

.exercise {
  background:#fff;
  border-radius:10px;
  padding:10px;
  margin-bottom:10px;
  box-shadow:0 2px 5px rgba(0,0,0,0.1);
}

canvas {
  width:100%;
  background:#16a34a;
  border-radius:10px;
  cursor:crosshair;
}

.player {
  display:flex;
  justify-content:space-between;
  margin-bottom:5px;
}
</style>
</head>

<body>

<header>
<input id="title" placeholder="Název TJ">
<input type="date" id="date">

<select id="category">
  <option>U6</option>
  <option>U7–U8</option>
  <option>U9–U10</option>
  <option>U11–U12</option>
  <option>U13–U14</option>
  <option>U15</option>
  <option>U19</option>
  <option>Muži</option>
</select>

<button onclick="save()">💾</button>
<button onclick="load()">📂</button>
<button onclick="exportPDF()">📄</button>
</header>

<div class="layout">

<!-- LEVÝ PANEL -->
<aside>
<h3>Cíl</h3>
<textarea id="goal"></textarea>

<h3>Hráči</h3>
<input id="playerName" placeholder="Jméno hráče">
<button onclick="addPlayer()">+ Přidat</button>
<div id="players"></div>

<h3>Databáze cvičení</h3>
<div id="exerciseDB"></div>
</aside>

<!-- STŘED -->
<main>
<button onclick="addExercise()">+ Cvičení</button>
<div id="exercises"></div>

<h3>Kreslení hřiště</h3>
<canvas id="pitch" width="400" height="250"></canvas>
</main>

<!-- PRAVÝ PANEL -->
<aside>
<h3>Náhled PDF</h3>
<div id="preview"></div>
</aside>

</div>

<script>

// ===== DATABÁZE CVIČENÍ =====
const DB = {
  "U6":[{name:"Honěná",desc:"Hra s míčem",time:10}],
  "U9–U10":[{name:"Rondo",desc:"Přihrávky",time:15}]
};

// ===== HRÁČI =====
let players = [];

function addPlayer(){
  const name = playerName.value;
  if(!name) return;

  players.push({name, present:true});
  playerName.value="";
  renderPlayers();
}

function renderPlayers(){
  const div = document.getElementById("players");
  div.innerHTML="";

  players.forEach((p,i)=>{
    const el = document.createElement("div");
    el.className="player";
    el.innerHTML = `
      ${p.name}
      <input type="checkbox" ${p.present?"checked":""}
      onchange="players[${i}].present=this.checked">
    `;
    div.appendChild(el);
  });
}

// ===== CVIČENÍ =====
function addExercise(data={}){
  const div = document.createElement("div");
  div.className="exercise";

  div.innerHTML=`
    <input placeholder="Název" value="${data.name||''}">
    <textarea>${data.desc||''}</textarea>
    <input type="number" value="${data.time||''}">
    <button onclick="this.parentElement.remove();updatePreview()">❌</button>
  `;

  exercises.appendChild(div);
  updatePreview();
}

// ===== KRESLENÍ =====
const canvas = document.getElementById("pitch");
const ctx = canvas.getContext("2d");

let drawing=false;

canvas.addEventListener("mousedown", ()=> drawing=true);
canvas.addEventListener("mouseup", ()=> drawing=false);

canvas.addEventListener("mousemove", e=>{
  if(!drawing) return;

  ctx.fillStyle="white";
  ctx.beginPath();
  ctx.arc(e.offsetX,e.offsetY,3,0,Math.PI*2);
  ctx.fill();
});

// ===== PREVIEW =====
function updatePreview(){
  let html = `
    <h2>${title.value}</h2>
    <p>${date.value} | ${category.value}</p>
    <p>${goal.value}</p>
    <hr>
  `;

  document.querySelectorAll(".exercise").forEach((ex,i)=>{
    const inputs = ex.querySelectorAll("input, textarea");

    html+=`
      <p><b>${i+1}. ${inputs[0].value}</b></p>
      <p>${inputs[1].value}</p>
      <p>${inputs[2].value} min</p>
    `;
  });

  html+=`<hr><b>Docházka:</b><br>`;
  players.forEach(p=>{
    html+=`${p.name} - ${p.present?"✔":"✖"}<br>`;
  });

  preview.innerHTML = html;
}

document.addEventListener("input", updatePreview);

// ===== PDF =====
function exportPDF(){
  html2pdf().from(preview).save("trening.pdf");
}

// ===== SAVE/LOAD =====
function save(){
  const data = {
    title:title.value,
    date:date.value,
    category:category.value,
    goal:goal.value,
    players,
    exercises:[...document.querySelectorAll(".exercise")].map(ex=>{
      const i=ex.querySelectorAll("input,textarea");
      return {name:i[0].value,desc:i[1].value,time:i[2].value};
    })
  };

  localStorage.setItem("training", JSON.stringify(data));
  alert("Uloženo");
}

function load(){
  const data = JSON.parse(localStorage.getItem("training"));
  if(!data) return;

  title.value=data.title;
  date.value=data.date;
  category.value=data.category;
  goal.value=data.goal;

  players=data.players||[];
  renderPlayers();

  exercises.innerHTML="";
  data.exercises.forEach(addExercise);
}

// INIT
updatePreview();

</script>

</body>
</html>
