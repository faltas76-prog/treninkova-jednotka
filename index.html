<!DOCTYPE html>
<html lang="cs">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tréninkový systém 5.1 Mobile</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>

<style>
body { margin:0; font-family:Arial; background:#f4f6f9; }
header {
  background:#1e293b; color:white; padding:10px;
  display:flex; flex-wrap:wrap; gap:8px;
}
header input, header select { padding:6px; flex:1 1 120px; }
button { padding:8px; cursor:pointer; border:none; border-radius:6px; }

.layout {
  display:flex;
  flex-direction:column;
}

aside, main {
  padding:10px;
}

.section {
  background:white;
  margin-bottom:10px;
  border-radius:10px;
  padding:10px;
}

.exercise {
  border:1px solid #ddd;
  padding:10px;
  margin-bottom:10px;
  border-radius:8px;
  background:#fafafa;
}

.exercise input, .exercise textarea {
  width:100%; margin-bottom:5px;
}

#preview { font-size:12px; }

/* DESKTOP */
@media(min-width:768px){
  .layout {
    display:grid;
    grid-template-columns:250px 1fr 300px;
    height:calc(100vh - 60px);
  }
  aside, main { overflow:auto; }
}
</style>
</head>

<body>

<header>
  <input id="title" placeholder="Název TJ">
  <input type="date" id="date">
  <select id="category">
    <option>U6</option>
    <option>U7–U8</option>
    <option>U9–U10</option>
    <option>U11–U12</option>
    <option>U13–U14</option>
    <option>U15</option>
    <option>U17</option>
    <option>U19</option>
    <option>Muži</option>
  </select>
  <button onclick="save()">💾</button>
  <button onclick="load()">📂</button>
  <button onclick="resetAll()">🔄</button>
  <button onclick="exportPDF()">📄</button>
</header>

<div class="layout">

<!-- PARAMETRY -->
<aside class="section">
  <h3>Cíl tréninku</h3>
  <textarea id="goal"></textarea>

  <h3>Typ</h3>
  <select id="type">
    <option>Herní</option>
    <option>Kondiční</option>
    <option>Kombinovaný</option>
  </select>

  <h3>Intenzita</h3>
  <input type="range" id="intensity" min="1" max="10">
</aside>

<!-- CVIČENÍ -->
<main class="section">
  <button onclick="addExercise()">+ Přidat cvičení</button>
  <div id="exercises"></div>
</main>

<!-- PREVIEW -->
<aside class="section">
  <h3>Náhled PDF</h3>
  <div id="preview"></div>
</aside>

</div>

<script>

// AUTO CÍL
category.addEventListener("change", function(){
  if(this.value==="U6") goal.value="Zábava a pohyb";
  else if(this.value==="U7–U8") goal.value="Základy s míčem";
  else if(this.value==="U9–U10") goal.value="Technika";
  updatePreview();
});

function addExercise(data={}){
  const div=document.createElement("div");
  div.className="exercise";
  div.innerHTML=`
    <input placeholder="Název" value="${data.name||""}">
    <textarea placeholder="Popis">${data.desc||""}</textarea>
    <input type="number" placeholder="Čas" value="${data.time||""}">
    <label><input type="checkbox"> Splněno</label>
    <button onclick="this.parentElement.remove();updatePreview()">❌</button>
  `;
  exercises.appendChild(div);
  updatePreview();
}

function updatePreview(){
  let html=`<h3>${title.value}</h3>
  <p>${date.value} | ${category.value}</p>
  <p>${goal.value}</p><hr>`;

  document.querySelectorAll(".exercise").forEach((ex,i)=>{
    const iel=ex.querySelectorAll("input,textarea");
    html+=`<b>${i+1}. ${iel[0].value}</b><br>${iel[1].value}<br>${iel[2].value} min<hr>`;
  });

  preview.innerHTML=html;
}

document.addEventListener("input", updatePreview);

function exportPDF(){ html2pdf().from(preview).save("trening.pdf"); }

function save(){
  const data={title:title.value,date:date.value,category:category.value,goal:goal.value,exercises:[]};
  document.querySelectorAll(".exercise").forEach(ex=>{
    const i=ex.querySelectorAll("input,textarea");
    data.exercises.push({name:i[0].value,desc:i[1].value,time:i[2].value});
  });
  localStorage.setItem("training", JSON.stringify(data));
  alert("Uloženo");
}

function load(){
  const d=JSON.parse(localStorage.getItem("training"));
  if(!d) return;
  title.value=d.title; date.value=d.date; category.value=d.category; goal.value=d.goal;
  exercises.innerHTML="";
  d.exercises.forEach(addExercise);
}

function resetAll(){ localStorage.clear(); location.reload(); }

</script>

</body>
</html>
